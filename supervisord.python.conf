[supervisord]
nodaemon=true

[program:python_app]
command=python /app/python_backend/src/main.py
directory=/app/python_backend/src
autostart=true
autorestart=true
startretries=3
priority=10
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[program:react_app]
command=npm start
directory=/app/frontend
environment=HOST="0.0.0.0",PORT="3000"
autostart=true
autorestart=true
startretries=3
priority=20
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0